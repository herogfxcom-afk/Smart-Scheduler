<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success! - Smart Scheduler</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #1c1e21;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        p {
            color: #65676b;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .button {
            display: inline-block;
            background-color: #0084ff;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .button:active {
            transform: scale(0.95);
        }

        .fallback {
            margin-top: 20px;
            font-size: 14px;
            color: #8a8d91;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>Successfully Connected!</h1>
        <p>Your Google Calendar is now linked to Smart Scheduler.</p>

        <div
            style="margin: 30px 0; padding: 20px; background: #f8f9fa; border-radius: 12px; border: 1px solid #e9ecef;">
            <p style="margin: 0; font-weight: 500; color: #495057;">Next Steps:</p>
            <ol style="text-align: left; margin-top: 10px; color: #6c757d; line-height: 1.6;">
                <li>Close this browser tab</li>
                <li>Return to the Telegram app</li>
                <li>The app will automatically refresh!</li>
            </ol>
        </div>

        <button onclick="closeWindow()" class="button">Return to Telegram</button>

        <p class="fallback">
            If the button doesn't work, please close this tab manually.<br>
            <a href="https://t.me/smartschedulertime_bot"
                style="color: #0084ff; text-decoration: none; font-weight: 500;">Open Bot Directly</a>
        </p>
    </div>

    <script>
        function closeWindow() {
            window.close();
            // Deep link fallback
            setTimeout(function () {
                window.location.href = "tg://resolve?domain=smartschedulertime_bot";
            }, 500);
        }
    </script>
</body>

</html>
